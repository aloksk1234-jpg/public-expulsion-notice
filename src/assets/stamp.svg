<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 180" width="450" height="180">
  <defs>
    <filter id="distress" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <g filter="url(#distress)">
    <!-- Outer Heavy Rectangle -->
    <rect x="8" y="8" width="434" height="164" rx="8" fill="none" stroke="#d97706" stroke-width="0" />
    <rect x="10" y="10" width="430" height="160" rx="6" fill="none" stroke="#dc2626" stroke-width="6" stroke-dasharray="190, 4, 320, 3" />
    <!-- Inner Thin Rectangle -->
    <rect x="20" y="20" width="410" height="140" rx="4" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="140, 2, 200, 4" />

    <!-- Top Label -->
    <text x="225" y="45" font-family="'JetBrains Mono', 'Courier New', monospace" font-weight="800" font-size="14" fill="#dc2626" text-anchor="middle" letter-spacing="3">
      ★ CITIZEN AUDIT OVERVIEW ★
    </text>

    <!-- Divider Line -->
    <line x1="30" y1="52" x2="420" y2="52" stroke="#dc2626" stroke-width="2" stroke-dasharray="6, 3" />

    <!-- Main Verdict -->
    <text x="225" y="102" font-family="'Inter', 'Arial Black', sans-serif" font-weight="900" font-size="44" fill="#dc2626" text-anchor="middle" letter-spacing="4">
      EXPELLED
    </text>
    
    <!-- Sub Verdict -->
    <text x="225" y="125" font-family="'JetBrains Mono', 'Arial Black', sans-serif" font-weight="800" font-size="18" fill="#dc2626" text-anchor="middle" letter-spacing="6">
      FAILURE OF GOVERNANCE
    </text>

    <!-- Bottom Line -->
    <line x1="30" y1="135" x2="420" y2="135" stroke="#dc2626" stroke-width="2" stroke-dasharray="8, 2" />

    <!-- Bottom Metadata -->
    <text x="35" y="152" font-family="'JetBrains Mono', monospace" font-weight="700" font-size="11" fill="#dc2626" text-anchor="start">
      CODE: #NEET-LEAK-2026
    </text>
    <text x="415" y="152" font-family="'JetBrains Mono', monospace" font-weight="700" font-size="11" fill="#dc2626" text-anchor="end">
      REF: ARTICLE-21A-FAIL
    </text>
  </g>
</svg>
